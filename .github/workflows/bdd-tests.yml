name: VIRAJ TESTING

on:
  push:
    branches: [ main, feat/testOne, feat/viraj ]
  pull_request:
    branches: [ main, feat/testOne ]

# Allow the workflow to publish the Allure report to the gh-pages branch
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Cucumber tests
        env:
          CI: true
        run: mvn test -s maven-settings-central.xml

      - name: Publish test summary
        if: always()
        run: |
          echo "## Cucumber Results" >> $GITHUB_STEP_SUMMARY
          echo "See the Allure report published to GitHub Pages." >> $GITHUB_STEP_SUMMARY

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports.html

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      # --- Allure report publishing ---

      - name: Load previous Allure history
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: Publish Allure report to GitHub Pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
