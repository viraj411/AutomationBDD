name: BDD CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: bdd-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── CI: compile, run all BDD tests, upload artifacts ──────────────────────
  ci-test:
    name: CI — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run BDD tests
        id: test
        env:
          CI: true
        run: mvn test -s maven-settings-central.xml

      - name: Publish test summary
        if: always()
        run: |
          echo "## BDD Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/org.example.RunCucumberTest.txt ]; then
            grep -E "Tests run|Failures|Errors|Skipped" \
              target/surefire-reports/org.example.RunCucumberTest.txt >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Location |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cucumber HTML | Artifacts → cucumber-report |" >> $GITHUB_STEP_SUMMARY
          echo "| Allure (after CD) | GitHub Pages (main push only) |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports.html
          retention-days: 14

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 14

  # ── CD: generate & publish Allure report to GitHub Pages (main only) ────
  cd-allure-report:
    name: CD — Publish Allure Report
    needs: ci-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Load previous Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p target/allure-results/history
            cp -r gh-pages/history/. target/allure-results/history/
          fi
          curl -sL -o allure.tgz \
            "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -zxf allure.tgz
          "allure-${ALLURE_VERSION}/bin/allure" generate target/allure-results --clean -o allure-report
        env:
          ALLURE_VERSION: 2.29.0

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Add report link to summary
        run: |
          echo "## Allure Report Published" >> $GITHUB_STEP_SUMMARY
          echo "View at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            >> $GITHUB_STEP_SUMMARY
